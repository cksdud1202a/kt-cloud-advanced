name: Deploy Monitoring System

on:
  push:
    branches:
      - main
    paths:
      - 'monitoring/**'
      - '.github/workflows/deploy-monitoring.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. 깃허브에 저장된 ANSIBLE_SSH_KEY를 사용하여 서버에 접속 & 배포
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 43.201.28.207
          username: ubuntu
          key: ${{ secrets.ANSIBLE_SSH_KEY }}
          script: |
            # 서버에 monitoring 폴더가 없으면 생성
            mkdir -p /home/ubuntu/monitoring
            
      # 2. 파일 전송 (SCP)
      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 43.201.28.207
          username: ubuntu
          key: ${{ secrets.ANSIBLE_SSH_KEY }}
          source: "monitoring/*"
          target: "/home/ubuntu/monitoring"
          strip_components: 1

      # 3. 도커 컴포즈 실행
      - name: Docker Compose Up
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 43.201.28.207
          username: ubuntu
          key: ${{ secrets.ANSIBLE_SSH_KEY }}
          script: |
            cd /home/ubuntu/monitoring
            sudo docker-compose up -d --build
          ssh ubuntu@43.201.28.207 "cd /home/ubuntu/monitoring && docker-compose up -d --build"
          
