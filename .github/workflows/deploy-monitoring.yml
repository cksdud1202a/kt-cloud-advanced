name: Deploy Monitoring System

on:
  push:
    branches:
      - main
    paths:
      - 'monitoring/**'
      - '.github/workflows/deploy-monitoring.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. 서버에 접속하여 필요한 폴더 생성
      - name: Create Directory on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 3.35.234.151
          username: ubuntu
          key: ${{ secrets.ANSIBLE_SSH_KEY }}
          script: |
            mkdir -p /home/ubuntu/monitoring

      # 2. 파일 전송 (SCP)
      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 3.35.234.151
          username: ubuntu
          key: ${{ secrets.ANSIBLE_SSH_KEY }}
          source: "monitoring/*"
          target: "/home/ubuntu/monitoring"
          strip_components: 1

      # 3. 도커 컴포즈 설치 확인 및 서비스 실행
      - name: Install Docker Compose & Up
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 3.35.234.151
          username: ubuntu
          key: ${{ secrets.ANSIBLE_SSH_KEY }}
          script: |
            # 패키지 업데이트 및 도커 컴포즈 설치
            sudo apt-get update
            sudo apt-get install -y docker-compose
            
            # 모니터링 폴더로 이동 후 빌드 및 실행
            cd /home/ubuntu/monitoring
            sudo docker-compose up -d --build