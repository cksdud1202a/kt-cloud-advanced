---
- name: Monitoring EC2 전체 설정
  hosts: monitoring
  become: true  # sudo 권한으로 실행

  # 실행 예시:
  # ansible-playbook ... -e onprem_nfs_ip=100.x.x.x -e onprem_nfs_path=/srv/nfs

  roles:
    - common      # swap, 패키지 업데이트
    - tailscale   # Tailscale VPN 설치 + 연결 감지 서비스 (수동 연결 필요 — README 참고)
    - docker      # Docker 설치
    - monitoring  # Prometheus, Grafana 컨테이너 실행, 후에 추가