---
# Tailscale 설치
- name: Tailscale 설치 스크립트 실행
  shell: curl -fsSL https://tailscale.com/install.sh | sh
  args:
    creates: /usr/bin/tailscale  # 이미 설치돼 있으면 스킵

# Subnet Router 동작을 위한 OS 레벨 IP 포워딩 활성화
# DMS → 모니터링 EC2 → Tailscale 망으로 패킷을 중계하려면 필수
- name: IP 포워딩 활성화
  sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_set: yes
    state: present
    reload: yes

# Tailscale 서비스 시작
- name: Tailscale 서비스 활성화
  systemd:
    name: tailscaled
    enabled: yes
    state: started

# Auth Key로 자동 연결 (GitHub Secret: TAILSCALE_AUTH_KEY)
# --advertise-routes : AWS VPC(192.168.0.0/16)를 온프레미스에 광고
#                     → 온프레미스가 AWS 내부 리소스(RDS, EKS 등)에 접근 가능
# --accept-routes    : 온프레미스가 광고하는 대역(192.168.56.0/24 등)을 수락
#                     → 이 EC2가 온프레미스 내부 네트워크에 접근 가능

# 이미 연결된 경우 tailscale up 스킵 (재실행 시 불필요한 실패 방지)
- name: Tailscale 연결 상태 확인
  command: tailscale ip -4
  register: ts_check
  ignore_errors: true
  changed_when: false

- name: Tailscale 자동 연결 (auth key)
  command: >
    tailscale up
    --auth-key={{ tailscale_auth_key }}
    --advertise-routes=192.168.0.0/16
    --accept-routes
  register: tailscale_up_result
  changed_when: "'already' not in tailscale_up_result.stderr"
  when: ts_check.rc != 0 or not (ts_check.stdout | regex_search('^100\\.'))

#########################################
# Tailscale 연결 감지 후 자동 복제 시작
#########################################

# 복제 시작 스크립트 설치
# Tailscale 연결 확인 → NFS 마운트 → rsync cron → DMS task 시작
- name: start-replication.sh 설치
  copy:
    dest: /usr/local/bin/start-replication.sh
    mode: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail

      FLAG=/var/lib/replication-started
      REGION=$(curl -s http://169.254.169.254/latest/meta-data/placement/region)
      LOG=/var/log/start-replication.log

      log() { echo "[$(date '+%Y-%m-%d %H:%M:%S')] $*" | tee -a "$LOG"; }

      # ── Tailscale 연결 확인 ──────────────────────────────────────────
      TS_IP=$(tailscale ip -4 2>/dev/null || true)
      if [[ ! "$TS_IP" =~ ^100\. ]]; then
        log "Tailscale 미연결 (IP: ${TS_IP:-none}). 종료."
        exit 1
      fi
      log "Tailscale 연결 확인: $TS_IP"

      # ── 패키지 설치 ─────────────────────────────────────────────────
      log "[1/4] nfs-common, rsync, awscli, inotify-tools 설치"
      apt-get update -qq && apt-get install -y nfs-common rsync awscli inotify-tools >> "$LOG" 2>&1

      # ── EFS DNS (Ansible 배포 시 주입) ──────────────────────────────
      log "[2/4] EFS 마운트"
      EFS_DNS="{{ efs_id }}.efs.${REGION}.amazonaws.com"

      NFS_IP="{{ onprem_nfs_ip }}"
      NFS_PATH="{{ onprem_nfs_path }}"

      mkdir -p /mnt/efs /mnt/onprem-nfs

      grep -q "$EFS_DNS" /etc/fstab || \
        echo "$EFS_DNS:/ /mnt/efs nfs4 nfsvers=4.1,rsize=1048576,wsize=1048576,hard,timeo=600,retrans=2,_netdev 0 0" >> /etc/fstab
      grep -q "${NFS_IP}:${NFS_PATH}" /etc/fstab || \
        echo "${NFS_IP}:${NFS_PATH} /mnt/onprem-nfs nfs defaults,_netdev 0 0" >> /etc/fstab

      mount -a 2>&1 | tee -a "$LOG" || true
      mount | grep -E 'efs|onprem-nfs' | tee -a "$LOG"

      # ── inotifywait 실시간 동기화 서비스 등록 ────────────────────────
      log "[3/4] inotifywait 실시간 동기화 서비스 등록"

      cat > /usr/local/bin/nfs-sync.sh << 'SYNC_EOF'
      #!/bin/bash
      LOG=/var/log/nfs-sync.log
      log() { echo "[$(date '+%Y-%m-%d %H:%M:%S')] $*" >> "$LOG"; }
      log "nfs-sync 서비스 시작"
      # inotify는 NFS 마운트에서 동작하지 않으므로 30초 polling으로 대체
      while true; do
        rsync -av --delete /mnt/onprem-nfs/ /mnt/efs/ >> "$LOG" 2>&1
        log "rsync 완료"
        sleep 30
      done
      SYNC_EOF
      chmod 755 /usr/local/bin/nfs-sync.sh

      cat > /etc/systemd/system/nfs-sync.service << 'SVC_EOF'
      [Unit]
      Description=inotifywait 기반 NFS→EFS 실시간 동기화
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      ExecStart=/usr/local/bin/nfs-sync.sh
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
      SVC_EOF

      systemctl daemon-reload
      systemctl enable nfs-sync
      systemctl restart nfs-sync
      log "nfs-sync 서비스 등록 완료"

      # ── DMS task 시작 ────────────────────────────────────────────────
      log "[4/4] DMS task 시작"
      TASK_ARN=$(aws dms describe-replication-tasks \
        --region "$REGION" \
        --filters Name=replication-task-id,Values=hybrid-dr-cdc-task \
        --query "ReplicationTasks[0].ReplicationTaskArn" \
        --output text)

      if [ "$TASK_ARN" = "None" ] || [ -z "$TASK_ARN" ]; then
        log "DMS task ARN을 찾을 수 없음. 건너뜀."
      else
        # DMS 리플리케이션 인스턴스 ARN 조회
        INSTANCE_ARN=$(aws dms describe-replication-instances \
          --region "$REGION" \
          --filters Name=replication-instance-id,Values=hybrid-dr-dms-instance \
          --query "ReplicationInstances[0].ReplicationInstanceArn" \
          --output text)

        # 소스/타겟 엔드포인트 ARN 조회
        SOURCE_ARN=$(aws dms describe-endpoints \
          --region "$REGION" \
          --filters Name=endpoint-id,Values=hybrid-dr-source-mysql \
          --query "Endpoints[0].EndpointArn" \
          --output text)

        TARGET_ARN=$(aws dms describe-endpoints \
          --region "$REGION" \
          --filters Name=endpoint-id,Values=hybrid-dr-target-rds \
          --query "Endpoints[0].EndpointArn" \
          --output text)

        # 연결 테스트 실행 (이미 successful이면 재실행해도 무방)
        log "DMS 소스 엔드포인트 연결 테스트 시작..."
        aws dms test-connection \
          --region "$REGION" \
          --replication-instance-arn "$INSTANCE_ARN" \
          --endpoint-arn "$SOURCE_ARN" >> "$LOG" 2>&1 || true

        log "DMS 타겟 엔드포인트 연결 테스트 시작..."
        aws dms test-connection \
          --region "$REGION" \
          --replication-instance-arn "$INSTANCE_ARN" \
          --endpoint-arn "$TARGET_ARN" >> "$LOG" 2>&1 || true

        # 소스 연결 테스트 성공 대기 (최대 10분)
        log "소스 엔드포인트 연결 테스트 완료 대기 중..."
        for i in $(seq 1 60); do
          SRC_STATUS=$(aws dms describe-connections \
            --region "$REGION" \
            --filters Name=endpoint-arn,Values="$SOURCE_ARN" \
            --query "Connections[?ReplicationInstanceArn=='$INSTANCE_ARN'].Status" \
            --output text 2>/dev/null || echo "unknown")
          log "  소스 연결 상태: $SRC_STATUS (${i}/60)"
          [ "$SRC_STATUS" = "successful" ] && break
          if [ "$SRC_STATUS" = "failed" ]; then
            log "소스 엔드포인트 연결 테스트 실패. DMS task 시작 불가."
            exit 1
          fi
          sleep 10
        done

        # 타겟 연결 테스트 성공 대기 (최대 10분)
        log "타겟 엔드포인트 연결 테스트 완료 대기 중..."
        for i in $(seq 1 60); do
          TGT_STATUS=$(aws dms describe-connections \
            --region "$REGION" \
            --filters Name=endpoint-arn,Values="$TARGET_ARN" \
            --query "Connections[?ReplicationInstanceArn=='$INSTANCE_ARN'].Status" \
            --output text 2>/dev/null || echo "unknown")
          log "  타겟 연결 상태: $TGT_STATUS (${i}/60)"
          [ "$TGT_STATUS" = "successful" ] && break
          if [ "$TGT_STATUS" = "failed" ]; then
            log "타겟 엔드포인트 연결 테스트 실패. DMS task 시작 불가."
            exit 1
          fi
          sleep 10
        done

        aws dms start-replication-task \
          --region "$REGION" \
          --replication-task-arn "$TASK_ARN" \
          --start-replication-task-type start-replication >> "$LOG" 2>&1 || \
          log "DMS task 시작 실패 (이미 실행 중일 수 있음)"
        log "DMS task 시작 요청 완료: $TASK_ARN"
      fi

      # ── 완료 flag ────────────────────────────────────────────────────
      touch "$FLAG"
      log "=== 복제 셋업 완료 ==="

# Tailscale 연결 대기 루프 스크립트 설치
# systemd ExecStart에 멀티라인 스크립트 직접 삽입 불가 → 별도 파일로 분리
- name: start-replication-loop.sh 설치
  copy:
    dest: /usr/local/bin/start-replication-loop.sh
    mode: "0755"
    content: |
      #!/bin/bash
      FLAG=/var/lib/replication-started
      if [ -f "$FLAG" ]; then
        echo "이미 복제 설정 완료 (flag: $FLAG). 스킵."
        exit 0
      fi
      echo "Tailscale 연결 대기 중..."
      while true; do
        TS_IP=$(tailscale ip -4 2>/dev/null || true)
        if [[ "$TS_IP" =~ ^100\. ]]; then
          echo "Tailscale 연결 확인: $TS_IP"
          /usr/local/bin/start-replication.sh
          exit 0
        fi
        echo "Tailscale 미연결. 30초 후 재시도..."
        sleep 30
      done

# Tailscale 연결 감지 → start-replication-loop.sh 자동 실행 서비스
- name: replication-start.service 설치
  copy:
    dest: /etc/systemd/system/replication-start.service
    mode: "0644"
    content: |
      [Unit]
      Description=Tailscale 연결 감지 후 자동 복제 시작
      After=network-online.target tailscaled.service
      Wants=network-online.target

      [Service]
      Type=simple
      ExecStart=/usr/local/bin/start-replication-loop.sh
      StandardOutput=journal
      StandardError=journal

      [Install]
      WantedBy=multi-user.target

#########################################
# socat MySQL 프록시 (DMS → 온프레미스 MySQL)
#########################################

# DMS가 Tailscale IP로 직접 연결 불가 → 모니터링 EC2 경유
# EC2:3306 → 온프레미스 NodePort(30306)로 포워딩
# replication-start.service 시작 전에 설치해야 apt lock 충돌 방지
- name: 필수 패키지 설치
  apt:
    name:
      - socat
      - mysql-client-core-8.0
      - nfs-common
      - rsync
      - awscli
      - inotify-tools
    state: present
    update_cache: yes

- name: replication-start.service 활성화 및 시작
  systemd:
    name: replication-start
    daemon_reload: yes
    enabled: yes
    state: started

- name: mysql-proxy.service 설치
  copy:
    dest: /etc/systemd/system/mysql-proxy.service
    mode: "0644"
    content: |
      [Unit]
      Description=MySQL TCP proxy (DMS → 온프레미스 MySQL)
      After=network-online.target tailscaled.service
      Wants=network-online.target

      [Service]
      Type=simple
      ExecStart=/usr/bin/socat TCP-LISTEN:3306,fork,reuseaddr TCP:{{ onprem_mysql_ip }}:{{ onprem_mysql_port | default('30306') }}
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target

- name: mysql-proxy.service 활성화 및 시작
  systemd:
    name: mysql-proxy
    daemon_reload: yes
    enabled: yes
    state: started