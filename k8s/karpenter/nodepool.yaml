apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    metadata:
      # Worker Node 라벨 (node_exporter DaemonSet nodeSelector용)
      labels:
        role: worker
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default

      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]  # Spot 제외 (DR 환경 안정성 우선)
        - key: node.kubernetes.io/instance-type
          operator: In
          values: ["t3.small", "t3.medium"]  # 비용 절감
        - key: topology.kubernetes.io/zone  # AZ 분산 추가
          operator: In
          values: ["ap-northeast-2a", "ap-northeast-2b"]

  # 노드 스케일 다운 정책
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized  # 사용률 낮으면 자동 제거 (Karpenter v1)